name: CI

on:
  push:
    branches:
      - "**"

jobs:
  build-test-typecheck:
    runs-on: ubuntu-latest
    env:
      STELLAR_CLI_VERSION: "27.0.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32v1-none

      - name: Install Stellar CLI
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/stellar.tar.gz \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/stellar.tar.gz -C /tmp
          sudo mv /tmp/stellar /usr/local/bin/stellar
          stellar --version

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/**/Cargo.lock', 'contract/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build contracts
        run: |
          cd contract/contracts/checkout && stellar contract build
          cd ../payment && stellar contract build

      - name: Test contracts
        run: |
          cd contract/contracts/checkout && cargo test
          cd ../payment && cargo test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build app
        run: pnpm build
